<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskRabbit - Get Help for Any Task</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-50 font-sans">
    <!-- Navbar -->
    <nav class="bg-white shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-8">
                <div class="flex items-center gap-2">
                    <span class="text-3xl font-bold text-purple-600">task</span>
                    <span class="text-3xl font-light text-gray-400">rabbit</span>
                </div>
                <div class="hidden md:flex gap-6 text-sm font-medium">
                    <a href="#" onclick="showSection('home')" class="hover:text-purple-600">Find Tasks</a>
                    <a href="#" onclick="showPostTask()" class="hover:text-purple-600">Post a Task</a>
                </div>
            </div>

            <div class="flex-1 max-w-xl mx-8">
                <input id="search-input" type="text" placeholder="What do you need help with?" 
                       class="w-full border border-gray-300 rounded-full px-6 py-3 focus:outline-none focus:border-purple-500"
                       onkeyup="if(event.key === 'Enter') searchTasks()">
            </div>

            <div class="flex items-center gap-6">
                <button onclick="showLoginModal()" id="login-btn" class="font-medium">Log in</button>
                <button onclick="showPostTask()" class="bg-purple-600 hover:bg-purple-700 text-white px-6 py-2 rounded-full font-medium">Post Task</button>
            </div>
        </div>
    </nav>

    <!-- HOME SECTION -->
    <section id="home-section" class="section">
        <!-- Hero -->
        <div class="bg-gradient-to-r from-purple-600 to-indigo-600 text-white py-20">
            <div class="max-w-5xl mx-auto px-6 text-center">
                <h1 class="text-5xl font-bold mb-6">Get Help for Any Task</h1>
                <p class="text-xl">Trusted local help for your home, errands, and more</p>
            </div>
        </div>

        <!-- Categories -->
        <div class="max-w-7xl mx-auto px-6 py-12">
            <h2 class="text-2xl font-semibold mb-6">Popular Services</h2>
            <div id="categories" class="grid grid-cols-3 md:grid-cols-6 gap-4"></div>
        </div>

        <!-- Featured Tasks -->
        <div class="max-w-7xl mx-auto px-6 pb-16">
            <h2 class="text-2xl font-semibold mb-6">Featured Tasks</h2>
            <div id="featured-tasks" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>
    </section>

    <!-- Post Task Modal -->
    <div id="post-task-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="bg-white rounded-3xl max-w-lg w-full mx-4 p-8">
            <h2 class="text-2xl font-bold mb-6">Post a New Task</h2>
            <input id="task-title" type="text" placeholder="Task Title" class="w-full p-4 border rounded-2xl mb-4">
            <textarea id="task-desc" placeholder="Describe your task" rows="4" class="w-full p-4 border rounded-2xl mb-6"></textarea>
            <input id="task-budget" type="number" placeholder="Budget (₹)" class="w-full p-4 border rounded-2xl mb-6">
            <button onclick="postTask()" class="w-full bg-purple-600 text-white py-4 rounded-2xl font-semibold">Post Task</button>
        </div>
    </div>

    <!-- Login Modal -->
    <div id="login-modal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center z-50">
        <div class="bg-white rounded-3xl p-8 max-w-sm w-full mx-4">
            <h2 class="text-2xl font-bold mb-6">Welcome to TaskRabbit</h2>
            <input id="login-email" type="text" placeholder="Email" class="w-full p-4 border rounded-2xl mb-4">
            <button onclick="login()" class="w-full bg-purple-600 text-white py-4 rounded-2xl font-semibold">Sign In</button>
            <p onclick="closeLoginModal()" class="text-center mt-6 text-purple-600 cursor-pointer">Close</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
